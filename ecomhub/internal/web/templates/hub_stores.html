{{define "hub_stores"}}
<!DOCTYPE html>
<html lang="en">
<head>
  {{template "head_meta" .}}
  <title>Stores - EcomHub</title>
</head>
<body>
{{template "header" .}}
<main class="container">
  <h1>Stores on EcomHub</h1>
  <ul class="hub-grid">
    {{range .Stores}}
    <li class="hub-card">
      <a class="hub-card-title" href="/s/{{.Subdomain}}">{{.Name}}</a>
      <p class="hub-card-meta">{{.Subdomain}}</p>
    </li>
    {{else}}
    <li class="hub-empty-state">No stores yet.</li>
    {{end}}
  </ul>
</main>
{{template "footer" .}}
</body>
</html>
{{end}}
