{{define "hub_stores"}}
<!DOCTYPE html>
<html lang="en">
<head>
  {{template "head_meta" .}}
  <title>Stores · EcomHub</title>
</head>
<body>
{{template "header" .}}
<main class="container">
  <h1>Stores on EcomHub</h1>
  <ul class="grid">
    {{range .Stores}}
    <li class="card">
      <a href="/s/{{.Subdomain}}">{{.Name}}</a>
      <p class="muted">{{.Subdomain}}</p>
    </li>
    {{else}}
    <p>No stores yet.</p>
    {{end}}
  </ul>
</main>
{{template "footer" .}}
</body>
</html>
{{end}}
