{{define "store_product_content"}}
  <p class="crumb"><a href="/s/{{.Store.Subdomain}}">← {{.Store.Name}}</a></p>
  <h1>{{.Product.Name}}</h1>
  <p class="price">
    {{if .Product.Price}}${{printf "%.2f" .Product.Price}}{{else}}$0.00{{end}}
  </p>
  <p>{{.Product.Description}}</p>
  {{if .Product.ImageURL}}
  <p><img class="product-img" src="{{.Product.ImageURL}}" alt=""></p>
  {{end}}
  <p class="muted">Stock: {{.Product.Stock}}</p>
  {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
  <form method="post" action="/s/{{.Store.Subdomain}}/cart/add" class="inline-form">
    <input type="hidden" name="product_id" value="{{.Product.ID}}">
    <label>Qty <input type="number" name="quantity" value="1" min="1" max="{{.Product.Stock}}"></label>
    <button type="submit" {{if le .Product.Stock 0}}disabled{{end}}>Add to cart</button>
  </form>
  <p><a href="/s/{{.Store.Subdomain}}/cart">View cart</a></p>
{{end}}
