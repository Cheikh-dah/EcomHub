{{define "hub_products"}}
<!DOCTYPE html>
<html lang="en">
<head>
  {{template "head_meta" .}}
  <title>Marketplace · EcomHub</title>
</head>
<body class="app">
{{template "header" .}}
<main class="container">
  <h1>Marketplace products</h1>
  <ul class="grid">
    {{range .Products}}
    <li class="card">
      <a href="/s/{{.Subdomain}}/products/{{.ID}}">{{.Name}}</a>
      <p class="muted">{{.StoreName}} · ${{printf "%.2f" .Price}}</p>
    </li>
    {{else}}
    <p>No products yet.</p>
    {{end}}
  </ul>
</main>
{{template "footer" .}}
</body>
</html>
{{end}}
