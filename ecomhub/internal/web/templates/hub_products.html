{{define "hub_products"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Marketplace · EcomHub</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
{{template "header" .}}
<main class="container">
  <h1>Marketplace products</h1>
  <ul class="grid">
    {{range .Products}}
    <li class="card">
      <a href="/s/{{.Subdomain}}/products/{{.ID}}">{{.Name}}</a>
      <p class="muted">{{.StoreName}} · ${{printf "%.2f" .Price}}</p>
    </li>
    {{else}}
    <p>No products yet.</p>
    {{end}}
  </ul>
</main>
{{template "footer" .}}
</body>
</html>
{{end}}
