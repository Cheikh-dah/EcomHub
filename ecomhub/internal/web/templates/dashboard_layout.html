{{define "dashboard_header"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - EcomHub Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">
    <div class="dashboard-grid">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar">
            {{template "dashboard_sidebar" .}}
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <header class="dashboard-main-header">
                <h1>{{.Title}}</h1>
                <div class="user-meta">
                    {{if .Token}}
                        <span class="user-email">Merchant</span>
                        <form action="/dashboard/logout" method="POST">
                            <button type="submit" class="logout-btn">Logout</button>
                        </form>
                    {{end}}
                </div>
            </header>
            
            <div class="dashboard-content">
{{end}}

{{define "dashboard_footer"}}
            </div>
        </main>

        <!-- Quick Actions -->
        <aside class="dashboard-actions">
            {{template "dashboard_actions" .}}
        </aside>
    </div>

    {{template "clerk_sync" .}}
</body>
</html>
{{end}}
