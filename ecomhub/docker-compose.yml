services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ecomhub
      POSTGRES_PASSWORD: ecomhub
      POSTGRES_DB: ecomhub
    ports:
      - "5432:5432"
    volumes:
      - ecomhub_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecomhub -d ecomhub"]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 5s

volumes:
  ecomhub_pg:
