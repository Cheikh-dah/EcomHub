name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

defaults:
  run:
    shell: bash
    working-directory: ecomhub

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check for forbidden files
        working-directory: .
        run: |
          if git ls-files | grep -E '(^|/)(tmp/|.*\.log$|.*\.exe$)'; then
            echo "Forbidden generated files should not be committed"
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ecomhub/go.mod
          cache-dependency-path: ecomhub/go.sum

      - name: Verify formatting
        run: test -z "$(gofmt -l .)"

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...